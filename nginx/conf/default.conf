# 1. HTTP : ACME + redirection vers HTTPS pour tous les domaines
server {
    listen 80;
    server_name theotime.pagies.lille.mds-project.fr www.theotime.pagies.lille.mds-project.fr;

    # Challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirige tout le reste en HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS pour le frontend (main domain)
server {
    listen 443 ssl;
    server_name theotime.pagies.lille.mds-project.fr www.theotime.pagies.lille.mds-project.fr;

    ssl_certificate     /etc/letsencrypt/live/theotime.pagies.lille.mds-project.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theotime.pagies.lille.mds-project.fr/privkey.pem;

    # SPA / frontend
    location / {
        proxy_pass http://client:80;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        proxy_pass http://server:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # pgAdmin routes
    location /pgadmin/ {
        proxy_pass http://pgadmin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /pgadmin;

        # CORS headers for pgAdmin
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
    }
}

