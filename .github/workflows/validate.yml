  dependency-security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      # Audit des vulnérabilités npm - Backend
      - name: Run npm audit (Backend)
        run: |
          cd server
          npm audit --audit-level=moderate
        continue-on-error: true

      # Audit des vulnérabilités npm - Frontend
      - name: Run npm audit (Frontend)
        run: |
          cd client
          npm audit --audit-level=moderate
        continue-on-error: true

      # Snyk pour une analyse plus approfondie
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      # Monitor les projets dans le dashboard Snyk
      - name: Monitor projects with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-security]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      # Build Backend
      - name: Build Backend
        run: |
          cd server
          npm run build

      # Build Frontend
      - name: Build Frontend
        run: |
          cd client
          npm run build

      # Upload build artifacts
      - name: Upload Backend Build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: server/dist
          retention-days: 7

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 7