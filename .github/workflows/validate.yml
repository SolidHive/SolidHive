# ========================================================================
# WORKFLOW: Validation et Sécurité du Code
# ========================================================================
# Ce workflow:
# 1. Vérifie le formatage du code (client et serveur)
# 2. Vérifie le linting du code (client et serveur)
# 3. Analyse SAST avec CodeQL pour détecter les vulnérabilités
# 4. Scanne les secrets exposés dans le dépôt
# 5. Vérifie les vulnérabilités des packages npm
# 6. Build les applications pour valider la compilation
# ========================================================================

name: Security & Code Validation

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Installation des dépendances
      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      # Vérification du formatage
      - name: Check formatting
        run: npm run format:check

      # Vérification du linting
      - name: Run linting
        run: npm run lint
        continue-on-error: true

