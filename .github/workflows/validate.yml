# ========================================================================
# WORKFLOW: Validation et Sécurité du Code
# ========================================================================
# Ce workflow:
# 1. Vérifie le formatage du code (client et serveur)
# 2. Vérifie le linting du code (client et serveur)
# 3. Vérifie les vulnérabilités des packages npm
# 4. Build les applications pour valider la compilation
# ========================================================================

name: Security & Code Validation

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Installation des dépendances
      - name: Install dependencies
        run: |
          npm install
          cd client && npm ci
          cd ../server && npm ci

      # Vérification du formatage
      - name: Check formatting
        run: npm run format:check

      # Vérification du linting
      - name: Run linting
        run: npm run lint
        continue-on-error: true

  dependency-security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd client && npm ci
          cd ../server && npm ci

      # Audit des vulnérabilités npm - Backend
      - name: Run npm audit (Backend)
        run: |
          cd server
          npm audit --audit-level=moderate
        continue-on-error: true

      # Audit des vulnérabilités npm - Frontend
      - name: Run npm audit (Frontend)
        run: |
          cd client
          npm audit --audit-level=moderate
        continue-on-error: true

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-security]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd client && npm ci
          cd ../server && npm ci

      # Build Backend
      - name: Build Backend
        run: |
          cd server
          npm run build

      # Build Frontend
      - name: Build Frontend
        run: |
          cd client
          npm run build

      # Upload build artifacts
      - name: Upload Backend Build
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: server/dist
          retention-days: 7

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 7