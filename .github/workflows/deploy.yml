name: Deploy to Production

on:
  push:
    branches:
      - develop

jobs:
  deploy_vps:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/develop' }}

    steps:
      - name: Déploiement SSH sur VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -euo pipefail
            cd ~/SolidHive
            git pull
            
            # Arrêter les conteneurs sans supprimer les images
            docker-compose -f docker-compose.prod.yml down
            
            # Build uniquement ce qui a changé, réutilisation maximale du cache
            docker-compose -f docker-compose.prod.yml build
            
            # Lancer les conteneurs
            docker-compose -f docker-compose.prod.yml up -d
            
            # Attendre que le serveur démarre
            sleep 10
            
            # Exécuter les migrations si nécessaire
            docker-compose -f docker-compose.prod.yml exec -T server npm run migration:run || echo "No migrations to run"