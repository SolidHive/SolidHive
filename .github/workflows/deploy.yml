name: Deploy to Production

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-docker-buildx-action@v3

    - name: Log in to Docker Hub (optional)
      uses: actions/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: env.DOCKER_USERNAME != ''

    - name: Build and push Docker images
      run: |
        # Build client image
        docker build -t solidhive-client:latest ./client

        # Build server image
        docker build -t solidhive-server:latest ./server

        # Save images as tar files for transfer
        docker save solidhive-client:latest > client-image.tar
        docker save solidhive-server:latest > server-image.tar

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        timeout: 30s
        script: |
          # Create backup directory
          mkdir -p ~/backup

          # Stop current services
          cd ~/SolidHive
          docker-compose -f docker-compose.prod.yml down || true

          # Backup current .env.prod
          cp server/.env.prod ~/backup/.env.prod.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

    - name: Transfer Docker images and configs
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        source: "client-image.tar,server-image.tar,docker-compose.prod.yml,nginx/,server/.env.prod"
        target: "~/SolidHive"
        strip_components: 0

    - name: Complete deployment on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        timeout: 60s
        script: |
          cd ~/SolidHive

          # Load Docker images
          echo "Loading Docker images..."
          docker load < client-image.tar
          docker load < server-image.tar

          # Clean up image files
          rm client-image.tar server-image.tar

          # Start services
          echo "Starting services..."
          docker-compose -f docker-compose.prod.yml up -d

          # Wait for services to be healthy
          echo "Waiting for services to start..."
          sleep 30

          # Check service status
          docker-compose -f docker-compose.prod.yml ps

          # Clean up old images
          echo "Cleaning up old images..."
          docker image prune -f

          echo "Deployment completed successfully!"

    - name: Health check
      run: |
        # Wait a bit for services to fully start
        sleep 10

        # Check if the application is responding
        if curl -f -s --max-time 30 https://theotime.pagies.lille.mds-project.fr > /dev/null; then
          echo "✅ Application is responding correctly"
        else
          echo "❌ Application health check failed"
          exit 1
        fi

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Deployment Failed',
            body: `The deployment to production failed. Check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
            labels: ['bug', 'deployment']
          })