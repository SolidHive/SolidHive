services:
  client:
    container_name: solidhive-client
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod-runner
      args:
        NODE_ENV: production
    environment:
      - VITE_HOST=0.0.0.0
    volumes:
      - ./client/package.json:/usr/src/app/package.json
    depends_on:
      - server
    networks:
      - app-network
    restart: unless-stopped

  server:
    container_name: solidhive-server
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod-runner
      args:
        NODE_ENV: production
    env_file:
      - ./server/.env.prod
    environment:
      - DB_PASSWORD=postgres
      - REDIS_PASSWORD=redis
      - NODE_ENV=production
    ports:
      - "3000:3000"
    command: ["npx", "nest", "start", "--watch"]
    volumes:
      - ./server/migrations:/usr/src/app/migrations
      - ./server/package.json:/usr/src/app/package.json
      - ./server/logs:/usr/src/app/logs
      - ./server/uploads:/usr/src/app/uploads
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  db:
    container_name: solidhive-db
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=solidhive
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    networks:
      - app-network
    restart: unless-stopped

  redis:
    container_name: solidhive-redis
    image: redis:7-alpine
    command: redis-server --requirepass redis
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: solidhive-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - client
      - server
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: solidhive-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - app-network
    restart: "no"

  certbot-renewer:
    image: alpine:3.20
    container_name: solidhive-certbot-renewer
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "apk add --no-cache certbot docker-cli >/dev/null &&
      while true; do
        certbot renew --webroot -w /var/www/certbot --deploy-hook 'docker kill -s HUP solidhive-nginx' || true;
        sleep 43200;
      done"
    networks:
      - app-network
    restart: unless-stopped

  pgadmin:
    container_name: solidhive-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@theotime.pagies.lille.mds-project.fr
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  pgadmin_data:

networks:
  app-network:
    driver: bridge