# Configuration de production pour SolidHive
# Ce fichier complète docker-compose.prod.yml

services:
  # Configuration spécifique pour la production
  server:
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=true
    restart: unless-stopped

  client:
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  db:
    restart: unless-stopped
    # Configuration de sauvegarde automatique
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

  nginx:
    restart: unless-stopped

